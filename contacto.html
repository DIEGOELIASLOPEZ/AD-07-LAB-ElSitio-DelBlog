<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div id="nav-menu"></div>

    <div class="container-principal">
        <!-- <header class="encabezado">
            <h1>Contactanos</h1>
            <p class="subtitle">¿Tienes alguna duda o proyecto en mente? ¡Estamos aquí para escucharte!<br>Envíanos un mensaje y cuéntanos cómo podemos ayudarte.</p>
        </header>*/ -->
        
        <main>
                <section class="seccion-contacto">
                    <h1 class="titulo-principal">Contactanos</h1>
                    <p class="descripcion-principal">¿Tienes alguna duda o proyecto en mente? ¡Estamos aquí para escucharte!</p>
                    <p class="descripcion-secundaria">Envíanos un mensaje y cuéntanos cómo podemos ayudarte.</p>

                <form class="formulario-contacto" action="#" method="post">
                    <div class="campo-formulario">
                        <label for="nombre" class="etiqueta-campo">Nombre *</label>
                        <input type="text" id="nombre" name="nombre" class="entrada-texto" placeholder="Tu nombre completo" />
                    </div>

                    <div class="campo-formulario">
                        <label for="email" class="etiqueta-campo">Email *</label>
                        <input type="email" id="email" name="email" class="entrada-texto" placeholder="tucorreo@gmail.com" />
                    </div>

                    <div class="campo-formulario">
                    <label for="mensaje" class="etiqueta-campo">Mensaje *</label>
                    <textarea id="mensaje" name="mensaje" class="area-texto" placeholder="Cuentanos..."></textarea>
                    </div>

                    <div class="campo-boton">
                    <button type="submit" class="boton-enviar">Enviar mensaje</button>
                    </div>
                </form>
    </section>
        </main>
    </div>
</body>
</html>
